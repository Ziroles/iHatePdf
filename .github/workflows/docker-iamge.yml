name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ziroles/ihatepdf:${{ github.sha }}
            ghcr.io/ziroles/ihatepdf:latest

      - name: Trigger K8s Deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.K8S_REPO_TOKEN }}" \
            https://api.github.com/repos/ziroles/k8s/dispatches \
            -d '{
              "event_type": "update_image", 
              "client_payload": {
                "project": "ihatepdf",
                "image": "ghcr.io/ziroles/ihatepdf",
                "sha": "${{ github.sha }}"
              }
            }'